<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presemble</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
<presemble:include src="header" />

<main class="guide">
  <nav class="guide__toc" id="guide-toc" aria-label="Contents"></nav>
  <article class="guide__content">
    <header class="guide__header">
      <presemble:insert data="guide.title" as="h1" />
      <presemble:insert data="guide.summary" as="p" />
    </header>
    <div class="guide__body">
      <presemble:insert data="guide.body" />
    </div>
  </article>
</main>

<presemble:include src="footer" />

<script>
(function () {
  var body = document.querySelector('.guide__body');
  var toc = document.getElementById('guide-toc');
  if (!body || !toc) return;

  var headings = body.querySelectorAll('h2, h3');
  if (headings.length === 0) return;

  var ol = document.createElement('ol');
  var currentH2Li = null;
  var currentH3Ol = null;

  headings.forEach(function (h) {
    if (!h.id) return;
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    li.appendChild(a);

    if (h.tagName === 'H2') {
      currentH3Ol = null;
      currentH2Li = li;
      ol.appendChild(li);
    } else {
      li.classList.add('toc-h3');
      if (!currentH3Ol) {
        currentH3Ol = document.createElement('ol');
        if (currentH2Li) {
          currentH2Li.appendChild(currentH3Ol);
        } else {
          ol.appendChild(currentH3Ol);
        }
      }
      currentH3Ol.appendChild(li);
    }
  });

  toc.appendChild(ol);
}());
</script>
</body>
</html>
