<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presemble</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
<presemble:include src="header" />

<main class="feature">
  <article>
    <header class="feature__header">
      <presemble:insert data="feature.title" as="h1" />
      <presemble:insert data="feature.tagline" />
    </header>
    <div class="feature__description">
      <presemble:insert data="feature.description" as="p" />
    </div>
    <div class="feature__body">
      <presemble:insert data="feature.body" />
    </div>
  </article>
</main>

<presemble:include src="footer" />
</body>
</html>
