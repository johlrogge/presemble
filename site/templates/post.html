<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presemble</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
<presemble:include src="header" />

<main class="post">
  <article>
    <header class="post__header">
      <presemble:insert data="post.title" as="h1" />
    </header>
    <div class="post__summary">
      <presemble:insert data="post.summary" as="p" />
    </div>
    <div class="post__author">
      <p class="post__byline">
        By <presemble:insert data="post.author" as="a" />
      </p>
      <div class="post__author-bio">
        <presemble:insert data="post.author.bio" as="p" />
      </div>
    </div>
    <div class="post__body">
      <presemble:insert data="post.body" />
    </div>
  </article>
</main>

<presemble:include src="footer" />
</body>
</html>
