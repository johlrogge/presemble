[workspace]
resolver = "2"
members = [
  "components/*",
  "projects/publisher",
  "projects/content_management",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
schema = { path = "components/schema" }
content = { path = "components/content" }
pulldown-cmark = "0.12"
