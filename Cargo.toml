[workspace]
resolver = "2"
members = [
  "bases/*",
  "components/*",
  "projects/publisher",
  "projects/content_management",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
schema = { path = "components/schema" }
content = { path = "components/content" }
template = { path = "components/template" }
publisher_cli = { path = "bases/publisher_cli" }
editor_server = { path = "bases/editor_server" }
pulldown-cmark = "0.12"
quick-xml = { version = "0.36", features = ["serialize"] }
