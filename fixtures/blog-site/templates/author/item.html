<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presemble Blog</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
<header class="site-header">
  <a class="site-header__logo" href="/">Presemble Blog</a>
  <nav class="site-header__nav">
    <a href="/">Home</a>
  </nav>
</header>

<main class="author">
  <article class="author__profile">
    <presemble:insert data="self.name" as="h1" />
    <div class="author__bio">
      <presemble:insert data="self.bio" as="p" />
    </div>
  </article>
</main>

<footer class="site-footer">
  <p class="site-footer__copy">&#169; Presemble Blog</p>
</footer>
</body>
</html>
