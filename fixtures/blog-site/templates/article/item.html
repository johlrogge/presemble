<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presemble Blog</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
<header class="site-header">
  <a class="site-header__logo" href="/">Presemble Blog</a>
  <nav class="site-header__nav">
    <a href="/">Home</a>
  </nav>
</header>

<main class="article">
  <article>
    <header class="article__header">
      <presemble:insert data="input.title" as="h1"></presemble:insert>
      <p class="article__byline">
        By <presemble:insert data="input.author" as="a"></presemble:insert>
      </p>
    </header>

    <template data-slot="input.cover">
      <div presemble:class="input.cover.orientation | match(landscape => &quot;cover--landscape&quot;, portrait => &quot;cover--portrait&quot;)">
        <presemble:insert data="input.cover"></presemble:insert>
      </div>
    </template>

    <div class="article__summary">
      <presemble:insert data="input.summary"></presemble:insert>
    </div>

    <div class="article__body">
      <presemble:insert data="input.body"></presemble:insert>
    </div>
  </article>
</main>

<footer class="site-footer">
  <p class="site-footer__copy">&#169; Presemble Blog</p>
</footer>
</body>
</html>
