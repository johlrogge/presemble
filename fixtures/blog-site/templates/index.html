<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presemble Blog</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
<header class="site-header">
  <a class="site-header__logo" href="/">Presemble Blog</a>
  <nav class="site-header__nav">
    <a href="/">Home</a>
  </nav>
</header>

<main class="article-list">
  <h1>Articles</h1>
  <ul class="article-list__items">
    <template data-each="site.articles">
      <li class="article-card">
        <presemble:insert data="title" as="h2" />
        <presemble:insert data="summary" />
        <presemble:insert data="link" />
      </li>
    </template>
  </ul>
</main>

<footer class="site-footer">
  <p class="site-footer__copy">&#169; Presemble Blog</p>
</footer>
</body>
</html>
