<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presemble</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
<header class="site-header">
  <a class="site-header__logo" href="/">Presemble</a>
  <nav class="site-header__nav">
    <a href="/">Home</a>
  </nav>
</header>

<main class="feature">
  <article>
    <header class="feature__header">
      <presemble:insert data="feature:title" as="h1" />
      <presemble:insert data="feature:tagline" />
    </header>
    <div class="feature__description">
      <presemble:insert data="feature:description" as="p" />
    </div>
    <div class="feature__body">
      <presemble:insert data="feature:body" />
    </div>
  </article>
</main>

<footer class="site-footer">
  <p class="site-footer__copy">&#169; Presemble</p>
</footer>
</body>
</html>
